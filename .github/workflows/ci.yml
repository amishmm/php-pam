name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php-version }} Test
    runs-on: ubuntu-24.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.3'
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        id: setup-php
        continue-on-error: true
        run: |
          # Add Ondrej PPA for PHP versions
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update

          # Install PHP and development tools
          sudo apt-get install -y \
            php${{ matrix.php-version }}-dev \
            php${{ matrix.php-version }}-cli \
            libpam0g-dev

          # Verify PHP installation
          php${{ matrix.php-version }} --version

      - name: Build Extension
        id: build
        continue-on-error: true
        run: |
          # Use phpize for the specific PHP version
          phpize${{ matrix.php-version }}
          ./configure --with-php-config=/usr/bin/php-config${{ matrix.php-version }}
          make

          # Verify the .so was built
          ls -lh modules/pam.so

      - name: Run PHPT Tests
        id: phpt-tests
        continue-on-error: true
        run: |
          # Run tests with the built extension
          TEST_PHP_EXECUTABLE=/usr/bin/php${{ matrix.php-version }} \
          TEST_PHP_ARGS="-d extension=$(pwd)/modules/pam.so" \
          /usr/bin/php${{ matrix.php-version }} run-tests.php tests/

      - name: Integration Test
        id: integration
        continue-on-error: true
        run: |
          # Create simple integration test file
          cat > /tmp/integration_test.php << 'EOF'
          <?php
          echo "PHP Version: " . phpversion() . "\n";
          echo "PAM Extension Loaded: " . (extension_loaded('pam') ? 'YES' : 'NO') . "\n";

          if (extension_loaded('pam')) {
              echo "PAM Version: " . phpversion('pam') . "\n";
              echo "pam_auth() exists: " . (function_exists('pam_auth') ? 'YES' : 'NO') . "\n";
              echo "pam_chpass() exists: " . (function_exists('pam_chpass') ? 'YES' : 'NO') . "\n";
              echo "pam.servicename: " . ini_get('pam.servicename') . "\n";
              echo "pam.force_servicename: " . ini_get('pam.force_servicename') . "\n";
          }

          echo "\n=== Integration Test PASSED ===\n";
          EOF

          # Run integration test
          /usr/bin/php${{ matrix.php-version }} \
            -d extension=$(pwd)/modules/pam.so \
            /tmp/integration_test.php

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php-${{ matrix.php-version }}
          path: |
            tests/*.out
            tests/*.diff
            tests/*.log
          if-no-files-found: ignore

      - name: Report Stage Results
        if: always()
        run: |
          echo "## Test Results for PHP ${{ matrix.php-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Setup PHP | ${{ steps.setup-php.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Extension | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPT Tests | ${{ steps.phpt-tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Test | ${{ steps.integration.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
